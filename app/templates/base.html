<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Búsqueda de Oficios{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <!-- NAVEGACIÓN -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">Búsqueda de Oficios</a>
            <ul class="navbar-menu">
                <li><a href="/">Inicio</a></li>
                <li><a href="/buscar">Buscar</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <!-- PIE DE PÁGINA -->
    <footer class="footer">
        <div class="container">
            <p>Sistema de Búsqueda de Oficios — 2026</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
