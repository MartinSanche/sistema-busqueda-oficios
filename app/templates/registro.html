{% extends 'base.html' %}
{% block title %}Registro — Búsqueda de Oficios{% endblock %}

{% block content %}
<section class="section">
    <h2>📝 Crear cuenta</h2>

    <div class="search-box" style="max-width: 480px;">
        <div id="mensaje-resultado"></div>

        <div class="field" style="margin-bottom: 16px;">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
        </div>
        <div class="field" style="margin-bottom: 16px;">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="tu@email.com">
        </div>
        <div class="field" style="margin-bottom: 16px;">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="field" style="margin-bottom: 24px;">
            <label>
                <input type="checkbox" id="es-profesional">
                Quiero registrarme como profesional
            </label>
        </div>

        <button class="btn btn-primary" onclick="registrar()">Crear cuenta</button>
        <p style="margin-top: 16px; font-size: 0.9rem; color: #666;">
            ¿Ya tenés cuenta? <a href="/">Volver al inicio</a>
        </p>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    async function registrar() {
        const nombre        = document.getElementById('nombre').value.trim()
        const email         = document.getElementById('email').value.trim()
        const password      = document.getElementById('password').value
        const es_profesional = document.getElementById('es-profesional').checked

        if (!nombre || !email || !password) {
            mostrarMensaje('Por favor completá todos los campos', 'error')
            return
        }
        if (password.length < 6) {
            mostrarMensaje('La contraseña debe tener al menos 6 caracteres', 'error')
            return
        }

        try {
            const res = await fetch('/api/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, email, password, es_profesional })
            })
            const data = await res.json()

            if (res.ok) {
                mostrarMensaje(`✅ ¡Cuenta creada! Bienvenido/a, ${data.usuario.nombre}`, 'exito')
                // Limpiar formulario
                ['nombre', 'email', 'password'].forEach(id =>
                    document.getElementById(id).value = '')
            } else {
                mostrarMensaje(`❌ ${data.error}`, 'error')
            }
        } catch (err) {
            mostrarMensaje('Error al conectar con el servidor', 'error')
        }
    }

    function mostrarMensaje(texto, tipo) {
        const div = document.getElementById('mensaje-resultado')
        const color = tipo === 'exito' ? '#27ae60' : '#e74c3c'
        div.innerHTML = `
            <p style="color: ${color}; padding: 12px; border-radius: 8px;
                       background: ${color}20; margin-bottom: 16px;">
                ${texto}
            </p>`
    }
</script>
{% endblock %}
